_format_version: "3.0"

services:
  - name: product-service
    url: http://product-service:5001
    routes:
      - name: product-route
        paths:
          - /products

  - name: order-service
    url: http://order-service:5002
    routes:
      - name: order-route
        paths:
          - /orders

  - name: user-service
    url: http://user-service:5003
    routes:
      - name: user-route
        paths:
          - /users
