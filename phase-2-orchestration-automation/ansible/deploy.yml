---
- name: Deploy SRE Ecommerce Platform to Kubernetes
  hosts: localhost
  connection: local

  tasks:
    - name: Create ecommerce namespace
      command: kubectl apply -f ../kubernetes/namespace.yml

    - name: Deploy product service
      command: kubectl apply -f ../kubernetes/product-service/

    - name: Deploy order service
      command: kubectl apply -f ../kubernetes/order-service/

    - name: Deploy user service
      command: kubectl apply -f ../kubernetes/user-service/

    - name: Deploy Kong API Gateway
      command: kubectl apply -f ../kubernetes/kong/

    - name: Deploy Prometheus
      command: kubectl apply -f ../kubernetes/prometheus/

    - name: Deploy Grafana
      command: kubectl apply -f ../kubernetes/grafana/

    - name: Verify all pods are running
      command: kubectl get pods -n ecommerce
      register: pod_status

    - name: Show pod status
      debug:
        msg: "{{ pod_status.stdout }}"
