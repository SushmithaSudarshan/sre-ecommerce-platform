---
- name: Deploy SRE Ecommerce Platform
  hosts: localhost
  connection: local

  vars:
    env: "dev"
    project_dir: "phase-1-docker-observability"

  tasks:
    - name: Print deployment environment
      debug:
        msg: "Deploying to {{ env }} environment"

    - name: Stop existing containers
      command: docker-compose down
      args:
        chdir: "{{ project_dir }}"
      ignore_errors: yes

    - name: Build and start containers
      command: docker-compose up --build -d
      args:
        chdir: "{{ project_dir }}"

    - name: Verify containers are running
      command: docker ps
      register: container_status

    - name: Show container status
      debug:
        msg: "{{ container_status.stdout }}"
