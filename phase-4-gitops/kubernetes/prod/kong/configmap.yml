apiVersion: v1
kind: ConfigMap
metadata:
  name: kong-config
  namespace: ecommerce-prod
data:
  kong.yml: |
    _format_version: "3.0"
    services:
      - name: product-service
        url: http://product-service:5001
        routes:
          - name: product-route
            paths:
              - /products
            strip_path: false
      - name: order-service
        url: http://order-service:5002
        routes:
          - name: order-route
            paths:
              - /orders
            strip_path: false
      - name: user-service
        url: http://user-service:5003
        routes:
          - name: user-route
            paths:
              - /users
            strip_path: false
